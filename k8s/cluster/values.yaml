cluster:
  secret: "cluster-secret"

coreDB:
  path: ""
  name: "hugr-core"
  image:
    repository: pgvector/pgvector
    tag: pg16
  auth:
    username: "postgres"
    password: "hugrPass"
  port: 5432
  storage: "1Gi"

ingress:
  enabled: true
  className: "nginx"
  host: "hugr-cluster.local"

# Shared defaults for all nodes. Management and workNode sections
# can override any value; ConfigMap templates use
# `.Values.management.<key>` / `.Values.workNode.<key>` with
# `| default .Values.defaults.<key>` fallback where needed.
defaults:
  bind: ":15000"
  serviceBind: ":13000"

  mcp:
    enabled: false
    oauthClientID: ""
    oauthClientSecret: ""
    embedderURL: ""
    vectorSize: 768

  oidc:
    issuer: ""
    clientID: ""
    clientSecret: ""
    timeout: ""
    tlsInsecure: false
    cookieName: ""
    scopes: "openid profile email"
    redirectURL: ""
    scopeRolePrefix: ""
    claims:
      userId: ""
      userName: ""
      role: ""

  hugrApp:
    heartbeatInterval: "30s"
    heartbeatTimeout: "10s"
    heartbeatRetries: "3"

  allowParallel: true
  maxParallelQueries: 0
  maxDepthInTypes: 0

  schemaCache:
    maxEntries: 0
    ttl: ""

  db:
    path: ""
    homeDirectory: "/db-home"
    timezone: ""  # IANA timezone (e.g., "Europe/Moscow"). Empty = system default (UTC)
    maxOpenConns: 0
    maxIdleConns: 0
    settings:
      allowedDirectories: ""
      allowedPaths: ""
      enableLogging: ""
      maxMemory: ""
      maxTempDirectorySize: ""
      tempDirectory: ""
      workerThreads: ""
      pgConnectionLimit: 64
      pgPagesPerTask: ""

  dbHome:
    mountPath: /db-home
    storage: 1Gi
    storageClass: "standard"

  adminUI: true
  adminFetchPath: "/query"
  debug: false
  httpProfiling: false
  secretKey: ""

  cors:
    allowedOrigins: ""
    allowedMethods: "GET, POST, PUT, DELETE, OPTIONS"
    allowedHeaders: "Authorization, Content-Type, Accept"

  auth:
    managedApiKeys: false
    allowedAnonymous: true
    anonymousRole: "admin"
    configFile: ""

  cache:
    ttl: ""
    l1:
      enabled: false
      maxSize: 0
      maxItemSize: 0
      shards: 0
      cleanTime: ""
      evictionTime: ""
    l2:
      enabled: false
      backend: ""
      addresses: ""
      database: 0
      username: ""
      password: ""

# Management node — overrides only what differs from defaults
management:
  image:
    repository: ghcr.io/hugr-lab/automigrate
    tag: v0.3.35
    pullPolicy: IfNotPresent

  cluster:
    role: "management"
    nodeName: "management"
    heartbeat: "30s"
    ghostTTL: "2m"

# Worker nodes — overrides only what differs from defaults
workNode:
  image:
    repository: ghcr.io/hugr-lab/server
    tag: v0.3.35
    pullPolicy: IfNotPresent

  replicas: 3

  cluster:
    role: "worker"
    pollInterval: "30s"

  # Workers typically have higher limits and caching enabled
  maxParallelQueries: 10
  maxDepthInTypes: 7

  db:
    maxOpenConns: 100
    maxIdleConns: 100

  shared:
    size: "1Gi"
    mountPath: "/data"
    hostPath: "/data"

  cache:
    ttl: "15m"
    l1:
      enabled: true
      maxSize: 4096
      maxItemSize: 1024
      shards: 4
      cleanTime: "1m"
      evictionTime: "5m"
    l2:
      enabled: true
      backend: "redis"
      addresses: ""
      database: 0
      username: ""
      password: ""

redis:
  image:
    repository: redis
    tag: 7-alpine

postgresql:
  bitnami: false
  fullnameOverride: "coredb"
  auth:
    postgresPassword: "hugrPass"
  service:
    type: ClusterIP
    port: 5432
  persistence:
    enabled: true

cache:
  bitnami: false
  fullnameOverride: redis
  architecture: standalone
  auth:
    enabled: false
  master:
    persistence:
      enabled: false
  redis:
    port: 6379

prometheus:
  enabled: false
